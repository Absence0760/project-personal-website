# Config for actions/labeler. Each top-level key is a label name; the
# `changed-files` list is the set of glob patterns that, if matched by any
# changed file, applies the label.
#
# These globs reflect this repo's actual layout — a Zola static site with
# no `frontend/` / `backend/` / `infra/` split.

"area:content":
  - changed-files:
      - any-glob-to-any-file:
          - content/**

"area:legal":
  - changed-files:
      - any-glob-to-any-file:
          - content/terms.md
          - content/privacy.md
          - content/refunds.md
          - content/contact.md
          - docs/legal-status.md

"area:templates":
  - changed-files:
      - any-glob-to-any-file:
          - templates/**
          - config.toml

"area:static":
  - changed-files:
      - any-glob-to-any-file:
          - static/**

"area:ci":
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/**
          - .github/dependabot.yml
          - .pre-commit-config.yaml

"area:docs":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - docs/**
          - CLAUDE.md

"area:claude":
  - changed-files:
      - any-glob-to-any-file:
          - .claude/**

"area:deps":
  - changed-files:
      - any-glob-to-any-file:
          - .github/dependabot.yml
          - .github/workflows/**
