name: Dependabot auto-merge

# Automatically squash-merges minor + patch Dependabot PRs once CI is green.
# Dependabot only opens GitHub Actions bumps here (see ../dependabot.yml) —
# without auto-merge, every weekly action-version bump would need manual
# review for no real signal.
#
# Major bumps stay manual. Major version jumps on actions have occasionally
# required matching changes (rename of inputs, new permission scopes); auto-
# merging those would be a footgun.
#
# Repository setting required: "Allow auto-merge" enabled on
# Settings → General → Pull Requests. Without it `gh pr merge --auto`
# returns an error and the workflow no-ops; PRs sit waiting for a human
# like before, so worst case is degenerate, not destructive.
#
# CI gating: the squash merge waits on the `Build` job in `ci.yml` (and any
# other required checks configured in branch protection) before landing.
# A red CI run keeps the PR queued indefinitely until either a human
# intervenes or the PR is closed.

on:
  pull_request_target:
    branches: [main]

permissions: read-all

jobs:
  auto-merge:
    name: Auto-merge minor + patch
    runs-on: ubuntu-latest
    # Pull-request author check guards against any non-dependabot PR
    # accidentally tripping this. The fetch-metadata action below is
    # hardened against forged commit messages from compromised branches,
    # but a belt-and-braces author gate costs nothing.
    if: github.actor == 'dependabot[bot]'
    timeout-minutes: 5
    permissions:
      # `pull_request_target` runs in the base-branch context — needs
      # explicit write grants for `gh pr review --approve` and
      # `gh pr merge --auto`. Scoped to this job only so a future job
      # in this workflow doesn't silently inherit them.
      contents: write
      pull-requests: write
    steps:
      - name: Read dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          # Fetch metadata signs the result with the workflow's own
          # GITHUB_TOKEN so a malicious PR can't claim to be a patch
          # bump it isn't.
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve + auto-merge minor / patch
        if: steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          # Best-effort approval. Fails closed (`|| true`) when the repo
          # setting "Allow GitHub Actions to create and approve pull
          # requests" is off — without it, `gh pr review --approve`
          # returns "GitHub Actions is not permitted to approve pull
          # requests". The workflow still proceeds to queue auto-merge;
          # if branch protection requires approvals the merge sits in
          # the queue until a human approves, which is the desired
          # behaviour for that protection-strict mode.
          gh pr review --approve "$PR_URL" || echo "::notice::PR approval not permitted (enable 'Allow GitHub Actions to create and approve pull requests' in repo settings to enable). Proceeding to queue auto-merge."
          # `--auto --squash` lands the merge as soon as every required
          # check turns green. If branch protection blocks the merge,
          # `--auto` queues it — a human can land it manually after the
          # protection is satisfied.
          gh pr merge --auto --squash "$PR_URL"
